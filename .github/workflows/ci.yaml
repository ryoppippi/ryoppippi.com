name: CI

on:
  push:
  pull_request:

permissions:
  actions: write
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Run Gitleaks
        run: nix develop --command gitleaks detect --source . --config .gitleaks.toml

      - name: Run Typo Check
        run: nix develop --command vp run typos

      - name: Run Vite+ Check
        run: nix develop --command vp check

      - name: Run Tests
        run: nix develop --command vp test --run

  action-timeline:
    needs:
      - ci
    if: ${{ always() }}
    runs-on: ubuntu-slim
    steps:
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1
