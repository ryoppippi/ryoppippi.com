# yaml-language-server: $schema=https://raw.githubusercontent.com/evilmartians/lefthook/master/schema.json

pre-commit:
  parallel: false
  commands:
    snapshot-tweets:
      glob: 'packages/content/src/blog/**/*.md'
      run: packages/content/scripts/snapshot-tweets.ts {staged_files}
      stage_fixed: true
    snapshot-ogp:
      glob: 'packages/content/src/blog/**/*.md'
      run: packages/content/scripts/snapshot-ogp.ts {staged_files}
      stage_fixed: true
    check:
      glob: '*'
      run: vp check --fix
      stage_fixed: true
    gitleaks:
      run: gitleaks protect --staged --config .gitleaks.toml
